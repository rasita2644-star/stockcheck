name: Generate Fundamental Resolver

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stockcheck-generated-data
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Resolve latest fundamental data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_fundamental_resolver.py

      - name: Validate static data
        run: python scripts/validate_static_data.py

      - name: Commit resolved fundamental data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data site/data static/data
          if git diff --cached --quiet; then
            echo "No fundamental resolver changes."
            exit 0
          fi
          git commit -m "Update resolved fundamental data"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
