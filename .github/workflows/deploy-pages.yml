name: Update technical data and deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    # GitHub Actions schedules are UTC and may be delayed. This targets ~15-minute refreshes.
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "stockcheck-pages-data-update"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate technical data only
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: python scripts/update_technical_data.py

      - name: Refresh latest static fundamental layer from main
        run: |
          mkdir -p site/data
          # A scheduled technical workflow can be queued before the slower fundamental
          # workflow commits fresh data. Fetch the newest main here so the Pages
          # artifact does not accidentally redeploy an old placeholder fundamental.json.
          git fetch origin main --depth=1 || true
          git checkout origin/main -- site/data/fundamental.json || true

      - name: Ensure static fundamental layer exists
        run: |
          mkdir -p site/data
          if [ ! -f site/data/fundamental.json ]; then
            printf '%s' '{"generatedAt":"Not generated yet","generatedAtFundamental":"Not generated yet","count":0,"watchlist":[],"rows":[],"fundamentals":{},"errors":[{"symbol":"SETUP","error":"Run the Update fundamental data workflow once."}],"mode":"github-pages-hybrid-fundamental-placeholder","dataLayer":"fundamental"}' > site/data/fundamental.json
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
