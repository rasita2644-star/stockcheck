name: Generate Attention List

on:
  workflow_dispatch:
  schedule:
    # After US market close, roughly 08:00 Bangkok / 01:00 UTC.
    - cron: "0 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: "stockcheck-attention-list"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Refresh technical layer for attention sync
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: python scripts/update_technical_data.py

      - name: Generate attention_today.json
        env:
          SEC_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
        run: python scripts/generate_attention.py

      - name: Validate attention/scanner data consistency
        run: python scripts/validate_static_data.py

      - name: Commit updated attention data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/attention_today.json site/data/attention_today.json static/data/attention_today.json
          if git diff --cached --quiet; then
            echo "No attention data changes to commit."
          else
            git commit -m "Update today's attention list"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
